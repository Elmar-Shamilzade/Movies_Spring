<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Management | Hub</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: rgba(23, 27, 34, 0.8);
            --accent: #3d5afe;
            --accent-hover: #536dfe;
            --success: #00e676;
            --danger: #ff5252;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(61, 90, 254, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(112, 0, 255, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 50px 20px;
        }

        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 30px;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--text-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Кнопка добавления */
        .btn-add {
            display: inline-flex;
            align-items: center;
            background: var(--accent);
            color: white !important;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(61, 90, 254, 0.3);
            margin-bottom: 40px;
        }

        .btn-add:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(61, 90, 254, 0.4);
            background: var(--accent-hover);
        }

        /* Панель поиска */
        .search-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 24px;
            margin-bottom: 40px;
        }

        .search-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            align-items: flex-end;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .search-panel input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 10px;
            color: white;
            outline: none;
            transition: border 0.3s;
        }

        .search-panel input:focus {
            border-color: var(--accent);
        }

        .btn-search {
            background: white;
            color: black;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-reset {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            margin-left: 15px;
        }

        /* Таблица */
        .table-wrapper {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            color: var(--text-dim);
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: left;
        }

        td {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        tr:last-child td { border-bottom: none; }

        tr:hover { background: rgba(255, 255, 255, 0.02); }

        /* Рейтинг и Жанр */
        .badge-genre {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
        }

        /* Кнопки действий */
        .action-btns {
            display: flex;
            gap: 10px;
        }

        .edit-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--accent);
            transition: 0.3s;
        }

        .edit-link:hover {
            background: var(--accent);
            color: white !important;
        }

        .delete-btn {
            background: rgba(255, 82, 82, 0.1);
            color: var(--danger);
            border: 1px solid rgba(255, 82, 82, 0.3);
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            transition: 0.3s;
        }

        .delete-btn:hover {
            background: var(--danger);
            color: white;
        }

        /* Flash сообщения */
        .flash {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid;
        }
        .flash-success { background: rgba(0, 230, 118, 0.1); color: var(--success); border-color: rgba(0, 230, 118, 0.2); }
        .flash-error { background: rgba(255, 82, 82, 0.1); color: var(--danger); border-color: rgba(255, 82, 82, 0.2); }

        /* Notification */
        #deleteNotification {
            position: fixed;
            top: 30px;
            right: 30px;
            background: var(--success);
            color: black;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="d-flex justify-content-between align-items-center">
        <h2>Cinema Database</h2>
        <a href="/movies/new" class="btn-add">+ Add New Movie</a>
    </div>

    <div th:if="${success}" class="flash flash-success">
        <span>●</span> <span th:text="${success}"></span>
    </div>

    <div th:if="${error}" class="flash flash-error">
        <span>●</span> <span th:text="${error}"></span>
    </div>

    <div class="search-panel">
        <form method="get" action="/movies">
            <div class="search-grid">
                <div>
                    <label>Title</label>
                    <input type="text" name="title" th:value="${title}" placeholder="Search titles...">
                </div>
                <div>
                    <label>Genre</label>
                    <input type="text" name="genre" th:value="${genre}" placeholder="e.g. Sci-Fi">
                </div>
                <div class="d-flex align-items-center">
                    <button type="submit" class="btn-search w-100">Find Movies</button>
                </div>
            </div>
            <div class="mt-3">
                <a th:href="@{/movies(sortBy='title', direction=${sortBy == 'title' and direction == 'asc' ? 'desc' : 'asc'})}" class="btn-reset">
                    Sort by Title <span th:text="${direction == 'asc' ? '↑' : '↓'}"></span>
                </a>
                <a href="/movies" class="btn-reset">Clear Filters</a>
            </div>
        </form>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>Title</th>
                <th>Genre</th>
                <th>Rating</th>
                <th>Release</th>
                <th>Duration</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="movie : ${movies}">
                <td><strong th:text="${movie.title}"></strong></td>
                <td><span class="badge-genre" th:text="${movie.genre}"></span></td>
                <td th:text="${movie.rating}"></td>
                <td th:text="${movie.releaseDate}" class="text-dim"></td>
                <td th:text="${movie.duration + ' min'}" class="text-dim"></td>
                <td>
                    <div class="action-btns">
                        <a th:href="@{/movies/{id}/edit(id=${movie.id})}" class="edit-link">Edit</a>
                        <form th:action="@{/movies/{id}/delete(id=${movie.id})}" method="post" onsubmit="return handleDelete()">
                            <button type="submit" class="delete-btn">Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div id="deleteNotification">✓ Movie deleted from database</div>

<script>
    function handleDelete() {
        if (!confirm("Are you sure you want to permanently remove this movie?")) {
            return false;
        }
        const box = document.getElementById("deleteNotification");
        box.style.display = "block";
        setTimeout(() => { box.style.display = "none"; }, 3000);
        return true;
    }
</script>

</body>
</html>
