<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Movie | Director's Cut</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #f59e0b; /* Золотистый цвет для редактирования */
            --accent-rgb: 245, 158, 11;
            --glass: rgba(20, 20, 20, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            /* Элегантный фон с градиентным пятном */
            background-image:
                radial-gradient(circle at 50% -10%, rgba(var(--accent-rgb), 0.15), transparent 60%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .edit-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 45px;
            border-radius: 28px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 550px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            animation: fadeInScale 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h2 {
            font-weight: 800;
            font-size: 2.2rem;
            margin-bottom: 8px;
            letter-spacing: -1px;
            text-align: center;
        }

        .edit-card::before {
            content: 'EDIT MODE';
            display: block;
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--accent);
            margin-bottom: 5px;
            font-weight: 600;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .full-width {
            grid-column: span 2;
        }

        .input-box {
            position: relative;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(var(--accent-rgb), 0.15);
        }

        .error-label {
            color: #ff4b4b;
            font-size: 0.8rem;
            margin-top: 5px;
            font-weight: 500;
        }

        .actions {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(var(--accent-rgb), 0.4);
            filter: brightness(1.1);
        }

        .back-btn {
            text-align: center;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            padding: 10px;
            transition: 0.3s;
        }

        .back-btn:hover {
            color: var(--text-main);
        }

        /* Иконка календаря под цвет темы */
        input::-webkit-calendar-picker-indicator {
            filter: invert(0.7) sepia(1) saturate(5) hue-rotate(10deg);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="edit-card">
    <h2>Edit Movie</h2>

    <form th:action="@{/movies}" th:object="${movieForm}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="form-grid">
            <div class="input-box full-width">
                <label>Movie Title</label>
                <input type="text" th:field="*{title}" placeholder="The Godfather" />
                <div class="error-label" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
            </div>

            <div class="input-box full-width">
                <label>Genre</label>
                <input type="text" th:field="*{genre}" placeholder="Drama, Crime" />
            </div>

            <div class="input-box">
                <label>Rating</label>
                <input type="number" step="0.1" th:field="*{rating}" />
            </div>

            <div class="input-box">
                <label>Duration</label>
                <input type="text" th:field="*{duration}" placeholder="175 min" />
            </div>

            <div class="input-box full-width">
                <label>Release Date</label>
                <input type="date" th:field="*{releaseDate}" />
            </div>
        </div>

        <div class="actions">
            <button type="submit">Update Movie Details</button>
            <a href="/movies" class="back-btn">Discard Changes</a>
        </div>
    </form>
</div>

</body>
</html>
