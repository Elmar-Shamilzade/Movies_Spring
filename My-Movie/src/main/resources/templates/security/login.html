<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Access | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        /* ===== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ===== */
        :root {
            --accent: #00f2ff;
            --accent-dark: #006ae6;
            --glass: rgba(0, 0, 0, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ===== ФОН С ЭФФЕКТОМ ГЛУБИНЫ ===== */
        body {
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #020205;
            color: #fff;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Анимированные световые пятна на фоне */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        body::before {
            background: var(--accent-dark);
            top: -10%;
            left: -10%;
        }

        body::after {
            background: #7000ff;
            bottom: -10%;
            right: -10%;
            animation-delay: -10s;
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 100px) scale(1.2); }
        }

        /* ===== КАРТОЧКА ЛОГИНА ===== */
        form {
            position: relative;
            width: 100%;
            max-width: 420px;
            padding: 60px 45px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            border-radius: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            text-align: center;
            animation: formEntrance 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes formEntrance {
            from { opacity: 0; transform: scale(0.8) rotateX(-20deg); }
            to { opacity: 1; transform: scale(1) rotateX(0deg); }
        }

        /* ===== ЗАГОЛОВОК ===== */
        h2 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 40px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ===== ПОЛЯ ВВОДА ===== */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        input {
            width: 100%;
            padding: 18px 25px;
            border-radius: 15px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            font-size: 16px;
            font-weight: 300;
            outline: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            transform: translateY(-2px);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* ===== КНОПКА (МАСШТАБНО) ===== */
        button {
            width: 100%;
            padding: 18px;
            margin-top: 15px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #000;
            font-size: 17px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.3);
        }

        button:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0, 242, 255, 0.5);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0) scale(0.98);
        }

        /* ===== СООБЩЕНИЯ ===== */
        .alert {
            margin-top: 25px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            animation: fadeIn 0.5s ease;
        }

        .alert-error {
            background: rgba(255, 77, 77, 0.1);
            color: #ff4d4d;
            border: 1px solid rgba(255, 77, 77, 0.2);
        }

        .alert-success {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Маленькая деталь для красоты - светящаяся линия под заголовком */
        h2::after {
            content: '';
            display: block;
            width: 40px;
            height: 4px;
            background: var(--accent);
            margin: 10px auto 0;
            border-radius: 10px;
            box-shadow: 0 0 10px var(--accent);
        }

    </style>
</head>
<body>

<form th:action="@{/login}" method="post">
    <h2>IDENTIFY</h2>

    <div class="input-group">
        <input type="text" name="username" placeholder="USERNAME" required autocomplete="off"/>
    </div>

    <div class="input-group">
        <input type="password" name="password" placeholder="PASSWORD" required/>
    </div>

    <button type="submit">Access System</button>

    <div th:if="${param.error}" class="alert alert-error">
        Access Denied. Check credentials.
    </div>

    <div th:if="${param.logout}" class="alert alert-success">
        Session ended safely.
    </div>
</form>

</body>
</html>
